<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kin3o — Search Results</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    padding: 2rem;
  }
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header h1 {
    font-size: 1.2rem;
    font-weight: 500;
    color: #888;
    margin-bottom: 0.5rem;
    letter-spacing: 0.05em;
  }
  .badge {
    display: inline-block;
    background: #D97706;
    color: #fff;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    margin-bottom: 0.75rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .query-text {
    font-size: 0.9rem;
    color: #999;
  }
  .query-text strong {
    color: #e0e0e0;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.25rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (max-width: 900px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 580px) {
    .grid { grid-template-columns: 1fr; }
  }
  .card {
    background: #2a2a2a;
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .card-preview {
    width: 100%;
    aspect-ratio: 1;
    background: #222;
    position: relative;
    overflow: hidden;
  }
  .card-preview .lottie-container {
    width: 100%;
    height: 100%;
  }
  .card-preview img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .card-preview .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 0.8rem;
  }
  .card-body {
    padding: 0.75rem 1rem;
  }
  .card-body h3 {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-body .author {
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 0.5rem;
  }
  .card-stats {
    display: flex;
    gap: 1rem;
    font-size: 0.7rem;
    color: #666;
    margin-bottom: 0.75rem;
  }
  .card-actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    padding: 0 1rem 0.75rem;
  }
  .card-actions a,
  .card-actions button {
    background: #333;
    color: #e0e0e0;
    border: 1px solid #444;
    padding: 0.35rem 0.65rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.7rem;
    text-decoration: none;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .card-actions a:hover,
  .card-actions button:hover {
    background: #444;
  }
  .card-actions .primary {
    background: #D97706;
    color: #fff;
    border-color: #D97706;
  }
  .card-actions .primary:hover {
    background: #b45309;
  }
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: #666;
    font-size: 1rem;
  }
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #333;
    color: #e0e0e0;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.8rem;
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
    z-index: 100;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
</style>
</head>
<body>
<div class="header">
  <h1>KIN3O</h1>
  <span class="badge" id="mode-badge"></span>
  <p class="query-text" id="query-text"></p>
</div>

<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none">No results found</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script>
  const animations = __SEARCH_RESULTS__;
  const meta = __SEARCH_META__;

  // Header
  const modeLabels = { search: 'Search', featured: 'Featured', popular: 'Popular', recent: 'Recent' };
  document.getElementById('mode-badge').textContent = modeLabels[meta.mode] || meta.mode;
  if (meta.query) {
    document.getElementById('query-text').innerHTML =
      `${meta.totalCount} results for <strong>"${meta.query}"</strong>`;
  } else {
    document.getElementById('query-text').textContent = `${meta.totalCount} animations`;
  }

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  if (animations.length === 0) {
    empty.style.display = 'block';
  }

  // Toast helper
  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // Build cards
  animations.forEach((anim, index) => {
    const card = document.createElement('div');
    card.className = 'card';

    const authorText = anim.createdBy ? anim.createdBy.username : 'Unknown';
    const likes = anim.likesCount || 0;
    const downloads = anim.downloads || 0;

    card.innerHTML = `
      <div class="card-preview" data-index="${index}">
        <div class="loading">Loading...</div>
      </div>
      <div class="card-body">
        <h3 title="${anim.name}">${anim.name}</h3>
        <div class="author">by ${authorText}</div>
        <div class="card-stats">
          <span>♥ ${likes.toLocaleString()}</span>
          <span>↓ ${downloads.toLocaleString()}</span>
        </div>
      </div>
      <div class="card-actions">
        ${anim.jsonUrl ? `<a href="${anim.jsonUrl}" download="${anim.slug}.json" class="primary">JSON</a>` : ''}
        ${anim.lottieUrl ? `<a href="${anim.lottieUrl}" download="${anim.slug}.lottie">Lottie</a>` : ''}
        <button onclick="copyCmd('${anim.uuid}')">Copy CLI</button>
        ${anim.url ? `<a href="${anim.url}" target="_blank" rel="noopener">View ↗</a>` : ''}
      </div>
    `;

    grid.appendChild(card);
  });

  function copyCmd(uuid) {
    navigator.clipboard.writeText('kin3o download ' + uuid).then(() => {
      showToast('Copied: kin3o download ' + uuid);
    });
  }

  // Lazy-load animations with IntersectionObserver
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const preview = entry.target;
      const index = parseInt(preview.dataset.index);
      const anim = animations[index];
      observer.unobserve(preview);
      loadPreview(preview, anim);
    });
  }, { rootMargin: '200px' });

  document.querySelectorAll('.card-preview').forEach(el => observer.observe(el));

  function loadPreview(container, anim) {
    if (anim.jsonUrl) {
      fetch(anim.jsonUrl)
        .then(r => r.json())
        .then(data => {
          container.innerHTML = '<div class="lottie-container"></div>';
          lottie.loadAnimation({
            container: container.querySelector('.lottie-container'),
            renderer: 'svg',
            loop: true,
            autoplay: true,
            animationData: data,
          });
        })
        .catch(() => {
          // Fallback to gif/image
          if (anim.gifUrl || anim.imageUrl) {
            container.innerHTML = `<img src="${anim.gifUrl || anim.imageUrl}" alt="${anim.name}">`;
          } else {
            container.innerHTML = '<div class="loading">Preview unavailable</div>';
          }
        });
    } else if (anim.gifUrl || anim.imageUrl) {
      container.innerHTML = `<img src="${anim.gifUrl || anim.imageUrl}" alt="${anim.name}">`;
    } else {
      container.innerHTML = '<div class="loading">No preview</div>';
    }
  }
</script>
</body>
</html>
